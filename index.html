<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CanalPilot - Route Optimizer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* --- 1. BASE THEME & RESET --- */
        * { box-sizing: border-box !important; }
        body, html {
            margin: 0; padding: 0; width: 100%; overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1D4433 0%, #2c5e47 100%);
            color: #333; height: 100vh;
        }

        h1 { text-align: center; color: #fff; margin: 15px 0; font-size: 28px; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }

        /* --- 2. THE 3-PANEL LAYOUT --- */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr; 
            gap: 20px; padding: 0 20px 20px 20px;
            max-width: 1600px; margin: 0 auto;
            height: calc(100vh - 80px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        /* THE FIX: Map container must have a forced height */
        #map { 
            width: 100%; height: 100%; min-height: 450px; 
            border-radius: 12px; background: #eee;
        }

        /* --- 3. UI & FILTERS --- */
        h3 { margin-top: 0; border-bottom: 2px solid #6FAF6F; padding-bottom: 8px; color: #1D4433; }
        label { font-weight: bold; font-size: 13px; color: #444; display: block; margin-top: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 5px; }
        
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .badge { padding: 4px 8px; border-radius: 12px; color: white; font-size: 11px; font-weight: bold; text-align: center; }
        .b-lock { background: #ff6b6b; } .b-bridge { background: #4ecdc4; }
        
        button { 
            background: #1D4433; color: white; border: none; padding: 15px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #6FAF6F; }
    </style>
</head>
<body>

    <h1>🚢 CanalPilot - Dashboard</h1>

    <div class="container">
        <div class="panel">
            <h3>Route Planner</h3>
            <label>Start Location:</label>
            <input type="text" id="startNode" list="lockList" placeholder="Search locks/bridges...">
            <label>Destination:</label>
            <input type="text" id="endNode" list="lockList" placeholder="Search destination...">
            <datalist id="lockList"></datalist>

            <label>Filters (Anxiety Management):</label>
            <div class="filter-grid">
                <div><input type="checkbox" checked> <span class="badge b-lock">LOCKS</span></div>
                <div><input type="checkbox" checked> <span class="badge b-bridge">BRIDGES</span></div>
            </div>

            <button onclick="calculateRoute()">Calculate Distance</button>
        </div>

        <div class="panel">
            <h3>Resource Management</h3>
            <div id="routeResult">
                <p style="text-align: center; color: #666; margin-top: 40px;">Ready for data fusion...</p>
            </div>
        </div>

        <div class="panel" style="padding: 0; overflow: hidden;">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script src="network.js"></script>
    <script src="locks.js"></script>
    <script src="bridges.js"></script>
    <script src="tunnels.js"></script>
    <script src="facilities.js"></script>

    <script src="engine.js"></script>
</body>
</html>
