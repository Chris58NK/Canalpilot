<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚤 CanalPilot - Route Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#74ebd5,#acb6e5); padding:20px; min-height:100vh; }
        
        /* Glassmorphism Panel */
        .panel { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); 
            margin-bottom: 20px; 
        }

        .container { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        h1 { grid-column: 1/-1; text-align: center; color: white; font-size: 28px; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        h2 { color: #333; font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #007BFF; padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 13px; }

        input, .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: rgba(255, 255, 255, 0.9); }
        input:focus { outline: none; border-color: #007BFF; box-shadow: 0 0 0 2px rgba(0,123,255,0.2); }
        
        .search-container { position: relative; }
        .search-results { position: absolute; background: white; border-radius: 0 0 8px 8px; max-height: 250px; overflow-y: auto; width: 100%; z-index: 1000; display: none; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .search-results.show { display: block; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
        .search-item:hover { background: #f0f8ff; color: #007BFF; }

        .selected-badge { background: #e8f5e9; padding: 10px; border-radius: 8px; border-left: 4px solid #28a745; font-size: 13px; margin-top: 10px; display: none; }
        .selected-badge.show { display: block; }

        button { width: 100%; padding: 12px; background: #007BFF; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }

        #map { height: 600px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); }
        .map-panel { grid-column: 2/4; padding: 0; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } .map-panel { grid-column: 1; order: 2; } }
    </style>
</head>
<body>

<h1>🚤 CanalPilot - Route Calculator</h1>

<div class="container">
    <div class="panel">
        <h2>Route Setup</h2>
        <div class="input-group">
            <label>Start Point:</label>
            <div class="search-container">
                <input type="text" id="startSearch" class="search-box" placeholder="Search for a location...">
                <div id="startResults" class="search-results"></div>
            </div>
            <div id="startBadge" class="selected-badge"></div>
        </div>

        <div class="input-group">
            <label>End Point:</label>
            <div class="search-container">
                <input type="text" id="endSearch" class="search-box" placeholder="Search for a destination...">
                <div id="endResults" class="search-results"></div>
            </div>
            <div id="endBadge" class="selected-badge"></div>
        </div>

        <div class="input-group">
            <label>Cruising Speed (mph):</label>
            <input type="number" id="speed" value="3" min="1" max="6" step="0.5">
        </div>

        <button onclick="calculateRoute()">Calculate Route</button>
        <button class="secondary" onclick="location.reload()">Reset Map</button>
    </div>

    <div class="panel">
        <h2>Journey Details</h2>
        <div id="results">
            <p style="color:#666; text-align:center; padding-top:20px;">Select your start and end points to see distances and ETA.</p>
        </div>
    </div>

    <div class="panel map-panel">
        <div id="map"></div>
    </div>
</div>

<script src="testCorridor.js"></script>
<script>
    let map, startMarker, endMarker, routePolyline;
    let currentStart = null, currentEnd = null;

    function initMap() {
        map = L.map('map').setView([52.4, -1.1], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        setupSearch('startSearch', 'startResults', 'startBadge', 'start');
        setupSearch('endSearch', 'endResults', 'endBadge', 'end');
    }

    function setupSearch(inputId, resultsId, badgeId, type) {
        const input = document.getElementById(inputId);
        const resultsDiv = document.getElementById(resultsId);
        
        input.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            resultsDiv.innerHTML = '';
            if (!query) { resultsDiv.classList.remove('show'); return; }

            const matches = testCorridor.features
                .filter(f => f.name.toLowerCase().includes(query))
                .slice(0, 10);

            matches.forEach(f => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.textContent = `${f.name} (${f.cumulativeDistance.toFixed(1)} mi)`;
                item.onclick = () => selectLocation(f, type, inputId, badgeId);
                resultsDiv.appendChild(item);
            });
            resultsDiv.classList.add('show');
        });
    }

    function selectLocation(feature, type, inputId, badgeId) {
        const badge = document.getElementById(badgeId);
        document.getElementById(inputId).value = feature.name;
        document.getElementById(inputId.replace('Search', 'Results')).classList.remove('show');
        
        badge.innerHTML = `<strong>Selected:</strong> ${feature.name}<br><small>Mile: ${feature.cumulativeDistance.toFixed(1)}</small>`;
        badge.classList.add('show');

        if (type === 'start') {
            currentStart = feature;
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.circleMarker([feature.latitude, feature.longitude], {radius: 8, color: '#28a745', fillOpacity: 0.8}).addTo(map);
        } else {
            currentEnd = feature;
            if (endMarker) map.removeLayer(endMarker);
            endMarker = L.circleMarker([feature.latitude, feature.longitude], {radius: 8, color: '#dc3545', fillOpacity: 0.8}).addTo(map);
        }
        
        if (currentStart && currentEnd) calculateRoute();
    }

    function calculateRoute() {
        if (!currentStart || !currentEnd) return;
        if (routePolyline) map.removeLayer(routePolyline);

        const speed = parseFloat(document.getElementById('speed').value) || 3;
        const dist = Math.abs(currentEnd.cumulativeDistance - currentStart.cumulativeDistance);
        const time = dist / speed;
        
        const path = testCorridor.features
            .filter(f => f.cumulativeDistance >= Math.min(currentStart.cumulativeDistance, currentEnd.cumulativeDistance) && 
                         f.cumulativeDistance <= Math.max(currentStart.cumulativeDistance, currentEnd.cumulativeDistance))
            .sort((a,b) => a.cumulativeDistance - b.cumulativeDistance)
            .map(f => [f.latitude, f.longitude]);

        routePolyline = L.polyline(path, {color: '#007BFF', weight: 5, opacity: 0.7}).addTo(map);
        map.fitBounds(routePolyline.getBounds(), {padding: [30, 30]});

        document.getElementById('results').innerHTML = `
            <div style="text-align:center;">
                <h3 style="color:#007BFF; font-size:24px;">${dist.toFixed(1)} miles</h3>
                <p>Estimated Time: <strong>${Math.floor(time)}h ${Math.round((time % 1) * 60)}m</strong></p>
                <p style="font-size:12px; color:#666; margin-top:10px;">(Calculated at ${speed} mph)</p>
            </div>
        `;
    }

    window.onload = initMap;
</script>
</body>
</html>
