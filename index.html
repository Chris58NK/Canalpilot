<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanalPilot Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #1D4433; color: white; display: flex; flex-direction: column; }
        header { padding: 15px; text-align: center; border-bottom: 2px solid #6FAF6F; background: rgba(0,0,0,0.2); }
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        /* 3-Column Layout */
        .column { display: flex; flex-direction: column; gap: 20px; }
        .side-col { width: 350px; }
        .map-col { flex: 1; min-width: 400px; }

        .panel { background: white; color: #333; padding: 15px; border-radius: 10px; border-left: 6px solid #6FAF6F; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h3 { margin: 0 0 10px 0; color: #1D4433; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #1D4433; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        #map { height: 100%; width: 100%; border-radius: 10px; background: #222; }
        #mooring-panel, #itinerary-panel { overflow-y: auto; max-height: 400px; }
    </style>
</head>
<body>
    <header><h1>CanalPilot Navigation</h1></header>
    <div class="main-container">
        <div class="column side-col">
            <div class="panel">
                <h3>Planner</h3>
                <label style="font-size: 12px; color: #666;">START POINT</label>
                <input type="text" id="startNode" list="lockList" placeholder="Search locks/bridges...">
                <label style="font-size: 12px; color: #666; margin-top: 10px; display: block;">DESTINATION</label>
                <input type="text" id="endNode" list="lockList" placeholder="Search destination...">
                <datalist id="lockList"></datalist>
                <button onclick="calculateRoute()">Calculate Route</button>
            </div>
            <div id="itinerary-panel" class="panel">
                <h3>Itinerary</h3>
                <div id="itinerary-content">Route results will appear here.</div>
            </div>
        </div>

        <div class="column side-col">
            <div id="mooring-panel" class="panel">
                <h3>Live Mooring Status</h3>
                <div id="mooring-content">Loading status...</div>
            </div>
        </div>

        <div class="column map-col">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script src="network.js"></script>
    <script src="locks.js"></script>
    <script src="bridges.js"></script>
    <script src="tunnels.js"></script>
    <script src="facilities.js"></script>

    <script src="engine.js"></script>
</body>
</html>
