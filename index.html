<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CanalPilot - Route Calculator</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #333;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 15px 0;
            font-size: 28px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            padding: 0 20px 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 70px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.88);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 0;
        }

        .map-panel {
            padding: 0;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 8px;
            color: #2c3e50;
        }

        label {
            font-weight: 700;
            font-size: 13px;
            color: #444;
            display: block;
            margin-top: 10px;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 5px;
            background: #fff;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }

        .b-lock { background: #ff6b6b; }
        .b-bridge { background: #4ecdc4; }
        .b-winding { background: #e74c3c; }
        .b-marina { background: #45b7d1; }
        .b-aqueduct { background: #f39c12; }
        .b-wharf { background: #a2d9ce; }
        .b-water { background: #3498db; }
        .b-tunnel { background: #95a5a6; }
        .b-junction { background: #738adc; }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-calc,
        .btn-reset {
            background: #007BFF;
        }

        .btn-calc:hover,
        .btn-reset:hover {
            background: #0056b3;
        }

        .filter-checks {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .filter-check-item {
            display: flex;
            align-items: center;
            width: 30%;
            min-width: 90px;
        }

        .filter-check-item input {
            margin-right: 5px;
        }

        .select-links {
            font-size: 12px;
            margin-top: 8px;
            display: block;
        }

        .select-links a {
            color: #007BFF;
            text-decoration: none;
            cursor: pointer;
        }

        #routeResult {
            margin-top: 10px;
            font-size: 15px;
            text-align: left;
            line-height: 1.5;
        }

        .placeholder-card {
            padding: 16px;
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            color: #475569;
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
                height: auto;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            .container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                padding: 0;
                height: auto;
            }

            .map-panel {
                order: -1;
            }

            #map {
                height: 50vh;
            }

            .filter-checks {
                display: grid;
                grid-template-columns: 50% 50%;
                row-gap: 15px;
                column-gap: 0;
                padding: 10px 0;
                width: 100%;
            }

            .filter-check-item {
                display: flex;
                align-items: center;
                justify-content: flex-start;
                width: 100%;
                margin: 0;
            }

            .filter-check-item input[type="checkbox"] {
                width: 20px;
                height: 20px;
                margin: 0 10px 0 0;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

    <h1>🚢 CanalPilot - Route Calculator</h1>

    <div class="container">
        <div class="panel">
            <h3>Route Setup</h3>

            <label for="startNode">Start Point:</label>
            <input type="text" id="startNode" list="lockList" placeholder="Select Start Location...">

            <label for="endNode">End Point:</label>
            <input type="text" id="endNode" list="lockList" placeholder="Select End Location...">

            <datalist id="lockList"></datalist>

            <h3 style="margin-top: 20px;">Settings</h3>

            <label for="speed">Speed (mph):</label>
            <input type="number" id="speed" value="3" step="0.5">
            <label for="lockDelay">Lock Working:</label>
            <select id="lockDelay">
            <option value="8">Fast (8 mins per lock)</option>
            <option value="12" selected>Medium (12 mins per lock)</option>
           <option value="18">Slow (18 mins per lock)</option>
      </select>
            <label>Filter Waypoints:</label>
            <div class="filter-checks">
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="lock" checked> <span class="badge b-lock">LOCK</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="bridge" checked> <span class="badge b-bridge">BRIDGE</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="winding" checked> <span class="badge b-winding">WINDING</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="marina" checked> <span class="badge b-marina">MARINA</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="aqueduct" checked> <span class="badge b-aqueduct">AQUEDUCT</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="wharf" checked> <span class="badge b-wharf">WHARF</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="water" checked> <span class="badge b-water">WATER</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="tunnel" checked> <span class="badge b-tunnel">TUNNEL</span></div>
                <div class="filter-check-item"><input type="checkbox" class="wp-filter" value="junction" checked> <span class="badge b-junction">JUNCTION</span></div>
            </div>

            <div class="select-links">
                <a onclick="setAllFilters(true)">Select all</a> |
                <a onclick="setAllFilters(false)">Select none</a>
            </div>

            <div class="button-group">
                <button class="btn-calc" onclick="calculateRoute()">Calculate Route</button>
                <button class="btn-reset" onclick="location.reload()">Reset</button>
            </div>
        </div>

        <div class="panel">
            <h3>Upcoming Features / Results</h3>
            <div id="routeResult">
                <div class="placeholder-card">
                    Select a start point and end point, then click <b>Calculate Route</b>.
                </div>
            </div>
        </div>

        <div class="panel map-panel">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="network.js"></script>
    <script src="locks.js"></script>
    <script src="bridges.js"></script>
    <script src="tunnels.js"></script>
    <script src="winding_holes.js"></script>
    <script src="aqueducts.js"></script>
    <script src="wharves.js"></script>
    <script src="tunnel_portals.js"></script>

    <script src="engine.js"></script>
</body>
</html>
