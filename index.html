 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚤 CanalPilot - Route Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.3); padding: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); margin-bottom: 20px; }
        input, select, button { border-radius: 8px !important; border: 1px solid #ddd; padding: 10px; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#74ebd5,#acb6e5);padding:20px;min-height:100vh}
        .container{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
        h1{grid-column:1/-1;text-align:center;color:white;font-size:28px;margin-bottom:20px}
        .panel{background:white;padding:20px;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
        h2{color:#333;font-size:18px;margin-bottom:15px;border-bottom:2px solid #007BFF;padding-bottom:10px}
        .search-box{width:100%;padding:10px;border:2px solid #ddd;border-radius:5px;font-size:14px}
        .search-results{position:absolute;background:white;border:2px solid #007BFF;max-height:250px;overflow-y:auto;width:calc(100% - 4px);z-index:100;display:none}
        .search-results.show{display:block}
        .search-item{padding:8px;cursor:pointer;border-bottom:1px solid #eee;font-size:12px}
        #map{height:600px;border-radius:8px}
        .map-panel{grid-column:2/4;padding:0}
        .badge { display:inline-block; padding:2px 6px; border-radius:10px; color:white; font-size:10px; font-weight:bold; margin-right:5px; }
        .badge-lock { background:#ff6b6b } .badge-bridge { background:#4ecdc4 }
        .feature-item { padding:10px; margin:8px 0; background:#f9f9f9; border-left:4px solid #007BFF; border-radius:4px; font-size:12px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>🚤 CanalPilot - Route Calculator</h1>
    <div class="container">
        <div class="panel glass-panel">
            <h2>Route Setup</h2>
            <div style="position:relative">
                <label>Start Point:</label>
                <input type="text" id="startSearch" class="search-box" placeholder="Search waypoints...">
                <div id="startResults" class="search-results"></div>
            </div>
            <div style="margin-top:10px">
                <label>Speed (mph):</label>
                <input type="number" id="speed" value="3" step="0.5" class="search-box">
            </div>
            <div style="margin-top:10px">
                <label>Lookahead (hours):</label>
                <input type="number" id="lookahead" value="2" step="0.5" class="search-box">
            </div>
            <div class="filter-checks" style="margin-top:10px">
                <label><input type="checkbox" class="wp-filter" value="lock" checked> LOCK</label>
                <label><input type="checkbox" class="wp-filter" value="bridge" checked> BRIDGE</label>
            </div>
            <button onclick="calculateLookahead()" style="width:100%; background:#007BFF; color:white; margin-top:15px; cursor:pointer;">Calculate</button>
            <button onclick="resetForm()" style="width:100%; background:#6c757d; color:white; margin-top:5px; cursor:pointer;">Reset</button>
        </div>
        <div class="panel">
            <h2>Upcoming Features</h2>
            <div id="results"><div style="text-align:center;color:#999;padding:20px;">Calculate to see list</div></div>
        </div>
        <div class="panel map-panel">
            <div id="map"></div>
        </div>
    </div>

    <script src="testCorridor.js"></script>
    <script>
        let map, markers=[], polyline, currentStart=null;
        const SEGMENT_ATTACH_LIMIT_METERS = 400;
        const DEG_TO_RAD = Math.PI/180;

        function initMap() {
            map = L.map('map').setView([52.36, -1.1], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            setupSearch();
        }

        function setupSearch() {
            const input = document.getElementById('startSearch');
            const results = document.getElementById('startResults');
            input.oninput = () => {
                const query = input.value.toLowerCase();
                results.innerHTML = '';
                if(!query) { results.classList.remove('show'); return; }
                const matches = testCorridor.features.filter(f => f.name.toLowerCase().includes(query)).slice(0, 10);
                matches.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.textContent = f.name;
                    div.onclick = () => { currentStart = f; input.value = f.name; results.classList.remove('show'); map.setView([f.latitude, f.longitude], 13); };
                    results.appendChild(div);
                });
                results.classList.add('show');
            };
        }

        function haversineDistanceMeters(a, b) {
            const R = 6371000;
            const dLat = (b[0]-a[0])*DEG_TO_RAD;
            const dLon = (b[1]-a[1])*DEG_TO_RAD;
            const h = Math.sin(dLat/2)**2 + Math.cos(a[0]*DEG_TO_RAD)*Math.cos(b[0]*DEG_TO_RAD)*Math.sin(dLon/2)**2;
            return 2 * R * Math.asin(Math.sqrt(h));
        }

        function splitOnJumps(coords, maxJump = 400) {
            if(!coords.length) return [];
            const segments = [];
            let current = [coords[0]];
            for(let i=1; i<coords.length; i++) {
                if(haversineDistanceMeters(coords[i-1], coords[i]) > maxJump) {
                    segments.push(current);
                    current = [coords[i]];
                } else { current.push(coords[i]); }
            }
            segments.push(current);
            return segments;
        }

        function calculateLookahead(){
            if(!currentStart) return alert('Select start point');
            const speed = parseFloat(document.getElementById('speed').value);
            const hours = parseFloat(document.getElementById('lookahead').value);
            const maxDist = currentStart.cumulativeDistance + (speed * hours);
            const activeFilters = new Set(Array.from(document.querySelectorAll('.wp-filter:checked')).map(cb=>cb.value));
            
            const journeyFeatures = testCorridor.features.filter(f => 
                f.cumulativeDistance > currentStart.cumulativeDistance && 
                f.cumulativeDistance <= maxDist && 
                activeFilters.has(f.type)
            ).sort((a,b) => a.cumulativeDistance - b.cumulativeDistance);

            const resultDiv = document.getElementById('results');
            resultDiv.innerHTML = '';
            
            markers.forEach(m => map.removeLayer(m));
            if(polyline) map.removeLayer(polyline);

            // Fetch high-detail path from waypoints
            const allFeaturesInRange = testCorridor.features.filter(f => f.cumulativeDistance >= currentStart.cumulativeDistance && f.cumulativeDistance <= maxDist).sort((a,b) => a.cumulativeDistance - b.cumulativeDistance);
            const pathCoords = allFeaturesInRange.map(f => [f.latitude, f.longitude]);

            // THE FIX: Split segments into a LayerGroup to prevent "crow-flies" lines
            const segments = splitOnJumps(pathCoords, 400);
            polyline = L.layerGroup().addTo(map);
            segments.forEach(seg => {
                L.polyline(seg, {color: '#667eea', weight: 6, opacity: 0.8, lineJoin: 'round'}).addTo(polyline);
            });

            journeyFeatures.forEach(f => {
                const m = L.circleMarker([f.latitude, f.longitude], {radius: 6, fillColor: '#007BFF', color: '#fff', weight: 1, fillOpacity: 1}).addTo(map);
                markers.push(m);
                resultDiv.innerHTML += `<div class="feature-item"><strong>${f.name}</strong><br><small>${f.cumulativeDistance.toFixed(1)} mi</small></div>`;
            });

            if(pathCoords.length > 0) map.fitBounds(L.latLngBounds(pathCoords), {padding:[50,50]});
        }

        function resetForm() { location.reload(); }
        window.onload = initMap;
    </script>
</body>
</html>
