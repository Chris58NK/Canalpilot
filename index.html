 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚤 CanalPilot - Route Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Your Modern Glassmorphism Styles */
        body { font-family: sans-serif; background: linear-gradient(135deg,#74ebd5,#acb6e5); padding: 20px; min-height: 100vh; margin: 0; }
        .container { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr 400px; gap: 20px; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        #map { height: 600px; border-radius: 15px; width: 100%; }
        .badge { padding: 4px 8px; border-radius: 10px; color: white; font-size: 10px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .badge-lock { background: #ff6b6b; }
        .badge-bridge { background: #4ecdc4; }
        .feature-item { background: white; margin: 10px 0; padding: 10px; border-radius: 8px; border-left: 5px solid #007BFF; }
        input { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: #007BFF; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .search-results { background: white; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; }
        .search-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<h1>🚤 CanalPilot - Route Calculator</h1>
<div class="container">
    <div class="glass-panel">
        <h3>Route Setup</h3>
        <label>Start Point:</label>
        <input type="text" id="startSearch" placeholder="Search waypoints...">
        <div id="startResults" class="search-results"></div>
        
        <label style="margin-top:15px; display:block;">Lookahead (Hours):</label>
        <input type="number" id="lookahead" value="2" step="0.5">
        
        <button onclick="calculateLookahead()">Calculate Journey</button>
        <button onclick="resetForm()" style="background:#6c757d;">Reset</button>
    </div>

    <div id="map"></div>

    <div class="glass-panel" style="overflow-y: auto; max-height: 600px;">
        <h3>Upcoming on your Route</h3>
        <div id="results">Enter start and click calculate</div>
    </div>
</div>

<script src="testCorridor.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map, markers = [], polyline, currentStart = null;

    // Initialize Map
    function initMap() {
        map = L.map('map').setView([52.36, -1.1], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setupSearch();
    }

    // Search Logic
    function setupSearch() {
        const input = document.getElementById('startSearch');
        const results = document.getElementById('startResults');
        input.oninput = () => {
            const query = input.value.toLowerCase();
            results.innerHTML = '';
            if(!query) return;
            testCorridor.features.filter(f => f.name.toLowerCase().includes(query)).slice(0, 10).forEach(f => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.textContent = f.name;
                div.onclick = () => { 
                    currentStart = f; 
                    input.value = f.name; 
                    results.innerHTML = '';
                    map.setView([f.latitude, f.longitude], 13);
                };
                results.appendChild(div);
            });
        };
    }

    // THE FIX: Calculate and Draw Curved Line
    function calculateLookahead() {
        if(!currentStart) return alert("Select a start point first");
        
        const speed = 3; // mph
        const hours = parseFloat(document.getElementById('lookahead').value);
        const maxDist = currentStart.cumulativeDistance + (speed * hours);
        
        // Find waypoints in range
        const journeyFeatures = testCorridor.features.filter(f => 
            f.cumulativeDistance > currentStart.cumulativeDistance && 
            f.cumulativeDistance <= maxDist
        ).sort((a,b) => a.cumulativeDistance - b.cumulativeDistance);

        // Clear Map
        markers.forEach(m => map.removeLayer(m));
        if(polyline) map.removeLayer(polyline);

        // DRAW CURVED JOURNEY
        // This connects the specific lat/lng points from your testCorridor.js
        const pathCoords = journeyFeatures.map(f => [f.latitude, f.longitude]);
        
        if(pathCoords.length > 1) {
            // We use weight 8 so it's a thick path following the canal
            polyline = L.polyline(pathCoords, {color: '#667eea', weight: 8, opacity: 0.7}).addTo(map);
            map.fitBounds(polyline.getBounds());
        }

        // Add Markers & Sidebar
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        
        journeyFeatures.forEach(f => {
            // Map Marker
            const m = L.circleMarker([f.latitude, f.longitude], {radius: 6, fillColor: '#007BFF', color: '#fff', weight: 2, fillOpacity: 1}).addTo(map);
            markers.push(m);
            
            // Sidebar Item
            resultsDiv.innerHTML += `
                <div class="feature-item">
                    <span class="badge badge-lock">${f.type.toUpperCase()}</span><br>
                    <strong>${f.name}</strong><br>
                    <small>${f.cumulativeDistance.toFixed(2)} mi</small>
                </div>`;
        });
    }

    function resetForm() { location.reload(); }
    window.onload = initMap;
</script>
</body>
</html>
