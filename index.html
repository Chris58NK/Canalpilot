  <!DOCTYPE html>
<html lang="en">
<head>
<style>
/* Glassmorphism Panel */
.glass-panel {
 background: rgba(255, 255, 255, 0.7);
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 border-radius: 15px;
 border: 1px solid rgba(255, 255, 255, 0.3);
 padding: 20px;
 box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
 margin-bottom: 20px;
}
input, select, button { border-radius: 8px !important; border: 1px solid #ddd; padding: 10px; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#74ebd5,#acb6e5);padding:20px;min-height:100vh}
.container{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
h1{grid-column:1/-1;text-align:center;color:white;font-size:28px;margin-bottom:20px}
.panel{background:white;padding:20px;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
h2{color:#333;font-size:18px;margin-bottom:15px;border-bottom:2px solid #007BFF;padding-bottom:10px}
.input-group{margin-bottom:15px}
label{display:block;font-weight:bold;margin-bottom:5px;color:#555;font-size:13px}
.search-box{width:100%;padding:10px;border:2px solid #ddd;border-radius:5px;font-size:14px}
.search-results{position:absolute;background:white;border:2px solid #007BFF;max-height:250px;overflow-y:auto;width:calc(100% - 4px);z-index:100;display:none}
.search-results.show{display:block}
.search-item{padding:8px;cursor:pointer;border-bottom:1px solid #eee;font-size:12px}
#map{height:600px;border-radius:8px}
.map-panel{grid-column:2/4;padding:0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.stat-box{background:#f0f8ff;padding:12px;border-radius:5px;border-left:4px solid #007BFF;text-align:center}
.stat-value{font-size:20px;font-weight:bold;color:#007BFF}
.feature-item{padding:10px;margin:8px 0;background:#f9f9f9;border-left:4px solid #007BFF;border-radius:4px;font-size:12px;cursor:pointer}
.badge{display:inline-block;padding:2px 6px;border-radius:10px;color:white;font-size:10px;font-weight:bold;margin-right:5px}
.badge-lock{background:#ff6b6b} .badge-bridge{background:#4ecdc4}
.filter-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.route-info{background:#e8f5e9;padding:10px;border-radius:5px;margin:10px 0;border-left:4px solid #28a745;font-size:12px}
@media (max-width:1200px){ .container{grid-template-columns:1fr 1fr} .map-panel{grid-column:1/-1} }
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚤 CanalPilot - Route Calculator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<h1>🚤 CanalPilot - Route Calculator</h1>
<div class="container">
<div class="panel">
<h2>Route Setup</h2>
<div class="input-group"><label>Start Point:</label><div style="position:relative"><input type="text" id="startSearch" class="search-box" placeholder="Type to search..."><div id="startResults" class="search-results"></div></div><div id="startBadge" class="selected-badge"></div></div>
<div class="input-group"><label>End Point:</label><div style="position:relative"><input type="text" id="endSearch" class="search-box" placeholder="Type to search..."><div id="endResults" class="search-results"></div></div><div id="endBadge" class="selected-badge"></div></div>
<div id="routeInfo" class="route-info" style="display:none">Distance: <strong id="routeDist">0</strong> mi | Duration: <strong id="routeDur">0</strong></div>
<div id="routeWarning" style="display:none; color:red; font-size:12px;"></div>
<h2>Calculate</h2>
<div class="input-group"><label>Speed (mph):</label><input type="number" id="speed" value="3" step="0.5" class="search-box"></div>
<div class="input-group"><label>Lookahead (hours):</label><input type="number" id="lookahead" value="2" step="0.5" class="search-box"></div>
<div class="input-group">
<div class="filter-checks">
<label><input type="checkbox" class="wp-filter" value="lock" checked> LOCK</label>
<label><input type="checkbox" class="wp-filter" value="bridge" checked> BRIDGE</label>
</div>
</div>
<button onclick="calculateLookahead()" style="width:100%; background:#007BFF; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Calculate</button>
<button onclick="resetForm()" style="width:100%; background:#6c757d; color:white; border:none; padding:10px; border-radius:5px; margin-top:5px; cursor:pointer;">Reset</button>
</div>
<div class="panel"><h2>Upcoming Features</h2><div id="results"><div style="text-align:center;color:#999;padding:20px;">Calculate to see list</div></div></div>
<div class="panel map-panel"><div id="map"></div></div>
</div>

<script src="testCorridor.js"></script>
<script>
let map, markers=[], polyline, startMarker, endMarker, routePolyline, currentStart=null, currentEnd=null, crtCanalGeometry=null;
const SEGMENT_ATTACH_LIMIT_METERS=400, DEG_TO_RAD=Math.PI/180;

// All your original logic functions follow...
async function fetchCRTCanalGeometry(){
    if(crtCanalGeometry)return crtCanalGeometry;
    // ... logic remains as you provided ...
}

// ... (Rest of fetch functions, haversine, findClosest, buildOrderedPath, etc) ...
// (I am skipping the middle 300 lines of unchanged helpers for clarity, keep yours)

function splitOnJumps(coords, maxJump = SEGMENT_ATTACH_LIMIT_METERS) {
    if(!coords || !coords.length) return [];
    const segments = [];
    let current = [coords[0]];
    for(let i=1; i<coords.length; i++){
        const R=6371000, toRad=v=>v*DEG_TO_RAD;
        const dLat=toRad(coords[i][0]-coords[i-1][0]), dLon=toRad(coords[i][1]-coords[i-1][1]);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(coords[i-1][0]))*Math.cos(toRad(coords[i][0]))*Math.sin(dLon/2)**2;
        const dist = 2*R*Math.asin(Math.sqrt(a));
        if(dist > maxJump){
            segments.push(current);
            current = [coords[i]];
        } else { current.push(coords[i]); }
    }
    segments.push(current);
    return segments;
}

function calculateLookahead(){
    if(!currentStart) return alert('Select start point');
    const speed=parseFloat(document.getElementById('speed').value);
    const hours=parseFloat(document.getElementById('lookahead').value);
    const maxDist=currentStart.cumulativeDistance + (speed*hours);
    const activeFilters=new Set(Array.from(document.querySelectorAll('.wp-filter:checked')).map(cb=>cb.value));
    
    const features=testCorridor.features.filter(f=>f.cumulativeDistance>currentStart.cumulativeDistance && f.cumulativeDistance<=maxDist && activeFilters.has(f.type)).sort((a,b)=>a.cumulativeDistance-b.cumulativeDistance);
    
    // UI Update
    const resDiv=document.getElementById('results');
    resDiv.innerHTML = `<div class="stats"><div class="stat-box"><div class="stat-value">${features.length}</div><div class="stat-label">Features</div></div></div>`;
    
    clearMarkers();
    
    const allFeaturesInWindow=testCorridor.features.filter(f=>f.cumulativeDistance>currentStart.cumulativeDistance && f.cumulativeDistance<=maxDist).sort((a,b)=>a.cumulativeDistance-b.cumulativeDistance);
    const routeEnd=allFeaturesInWindow.length>0 ? allFeaturesInWindow[allFeaturesInWindow.length-1] : null;

    let pathCoords = null;
    if(routeEnd) pathCoords = getCanalPathBetween(currentStart.latitude, currentStart.longitude, routeEnd.latitude, routeEnd.longitude);
    if(!pathCoords || pathCoords.length < 2) pathCoords = allFeaturesInWindow.map(f=>[f.latitude,f.longitude]);

    // THE FIX: Use splitOnJumps and L.layerGroup
    const segments = splitOnJumps(pathCoords, 400);
    polyline = L.layerGroup().addTo(map);
    segments.forEach(seg => {
        L.polyline(seg, {color:'#667eea', weight:5, opacity:0.9, lineJoin:'round'}).addTo(polyline);
    });

    features.forEach(f=>{
        const m=L.circleMarker([f.latitude,f.longitude],{radius:6,fillColor:'#007BFF',color:'white',weight:1,fillOpacity:0.8}).bindPopup(f.name).addTo(map);
        markers.push(m);
    });

    if(pathCoords.length > 0) map.fitBounds(L.latLngBounds(pathCoords), {padding:[50,50]});
}

function clearMarkers(){
    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    if(polyline) map.removeLayer(polyline);
}

// ... (Rest of search, reset, initMap logic) ...
window.onload=function(){initMap();};
</script>
</body>
</html>
